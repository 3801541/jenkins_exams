apiVersion: v1
kind: Service
metadata:
  name: movie-db
spec:
  selector:
    app: movie-db
  ports:
    - port: {{ .Values.movieDb.port }}
      targetPort: {{ .Values.movieDb.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "movies.fullname" . }}
  labels:
    {{- include "movies.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "movies.selectorLabels" . | nindent 4 }}
